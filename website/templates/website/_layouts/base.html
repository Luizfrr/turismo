<!DOCTYPE html>
<html lang="pt-br">
{% load static %}
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Porto Seguro{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'website/css/style.css' %}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">
    {% block styles %}{% endblock %}
</head>
<body>

    <nav>
        <a href="{% url 'website:index' %}">Início</a>
        <a href="{% url 'website:atracoes' %}">Atrações</a>
        <a href="{% url 'website:historia' %}">História</a>
        <a href="{% url 'website:galeria' %}">Galeria</a>
    </nav>

    {% block conteudo %}{% endblock %}

    <footer>
        <p>Porto Seguro &copy; 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
